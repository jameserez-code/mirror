<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror — Workflow Editor</title>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "reactflow": "https://esm.sh/reactflow@11.11.4"
  }
}
</script>
<style>
:root{--bg:#0d0d10;--bg2:#18181c;--bg3:#222228;--bg4:#2a2a30;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.06);--accent:#6366f1;--accent-light:#818cf8;--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--purple:#8b5cf6;--radius:10px;--radius-sm:7px;--toolbar-h:48px;--sidebar-w:260px;--inspector-w:380px;--exec-h:240px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
#root{width:100%;height:100vh;display:flex;flex-direction:column}
.toolbar{height:var(--toolbar-h);display:flex;align-items:center;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0;z-index:10}
.toolbar-logo{font-size:15px;font-weight:700;color:var(--accent-light);margin-right:12px;letter-spacing:-0.3px}
.toolbar-name{font-size:13px;color:var(--text);font-weight:500;margin-right:auto;background:none;border:1px solid transparent;border-radius:4px;padding:2px 6px;outline:none;font-family:inherit;max-width:220px}
.toolbar-name:focus{border-color:var(--accent);background:var(--bg3)}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.toolbar-btn{height:28px;padding:0 12px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:12px;cursor:pointer;transition:all 0.12s;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap}
.toolbar-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent-light)}
.toolbar-btn:disabled{opacity:0.35;cursor:default}
.toolbar-btn.accent{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.toolbar-btn.accent:hover:not(:disabled){background:var(--accent-light)}
.toolbar-btn.kb-shortcut{font-size:10px;color:var(--text3);margin-left:-2px;opacity:0.7}
.workspace{flex:1;display:flex;overflow:hidden;position:relative}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:5}
.sidebar-search{padding:12px}
.sidebar-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-cats{flex:1;overflow-y:auto;padding:0 8px 12px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.sidebar-cat{margin-bottom:16px}
.sidebar-cat-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);padding:4px 8px;margin-bottom:4px;display:flex;align-items:center;gap:6px;cursor:pointer}
.sidebar-cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-node{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:grab;transition:background 0.1s;font-size:12px;color:var(--text2)}
.sidebar-node:hover{background:var(--bg3);color:var(--text)}
.sidebar-node:active{cursor:grabbing}
.sidebar-node-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.canvas-wrap{flex:1;position:relative}
.react-flow__node{font-family:inherit!important}
.react-flow__attribution,.react-flow__panel{border:none!important}
.react-flow__edge.selected .react-flow__edge-path{stroke:var(--accent-light)!important;stroke-width:3!important}
.react-flow__edge:hover .react-flow__edge-path{stroke:var(--text2)!important}
.inspector{width:var(--inspector-w);background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:5;overflow:hidden}
.inspector.hidden{display:none}
.inspector-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px;text-align:center;padding:40px;gap:12px}
.inspector-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.inspector-tab{flex:1;padding:10px 0;text-align:center;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.12s;background:none;font-family:inherit;border-top:none;border-left:none;border-right:none}
.inspector-tab.active{color:var(--accent-light);border-bottom-color:var(--accent)}
.inspector-tab:hover{color:var(--text2)}
.inspector-content{flex:1;overflow-y:auto;padding:16px}
.inspector-section{margin-bottom:18px}
.inspector-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:6px}
.inspector-field{margin-bottom:10px}
.inspector-field label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px}
.inspector-field input,.inspector-field textarea,.inspector-field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.inspector-field input:focus,.inspector-field textarea:focus{border-color:var(--accent)}
.inspector-field textarea{resize:vertical;min-height:56px}
.inspector-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;margin-right:4px}
.bg-cloud{background:rgba(34,197,94,0.15);color:#4ade80}
.bg-desktop{background:rgba(99,102,241,0.15);color:#a5b4fc}
.bg-warn{background:rgba(234,179,8,0.15);color:#facc15}
.bg-provider{background:rgba(148,163,184,0.1);color:var(--text2)}
.exec-panel{height:var(--exec-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:5;transition:height 0.2s}
.exec-panel.collapsed{height:36px}
.exec-header{height:36px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);gap:12px;flex-shrink:0;cursor:pointer;user-select:none}
.exec-header:hover{background:var(--bg3)}
.exec-header-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3)}
.exec-runs{flex:1;overflow-y:auto;padding:8px 16px}
.exec-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:11px;border-bottom:1px solid var(--border2);cursor:pointer}
.exec-row:hover{background:var(--bg3);margin:0 -16px;padding-left:16px;padding-right:16px}
.exec-row:last-child{border-bottom:none}
.exec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.exec-dot.ok{background:var(--green)}
.exec-dot.fail{background:var(--red)}
.exec-dot.run{background:var(--blue);animation:pulse 1.5s infinite}
.exec-time{color:var(--text3);width:46px;flex-shrink:0;font-variant-numeric:tabular-nums}
.exec-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exec-dur{color:var(--text3);width:44px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes flowDash{to{stroke-dashoffset:-20}}
@keyframes nodePulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.4)}50%{box-shadow:0 0 0 6px rgba(99,102,241,0)}}
@keyframes nodeSuccess{0%{box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
@keyframes nodeFail{0%{box-shadow:0 0 0 0 rgba(239,68,68,0.6)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Context Menu */
.ctx-menu{position:fixed;z-index:1000;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;min-width:180px;box-shadow:0 8px 30px rgba(0,0,0,0.5);animation:slideUp 0.12s ease}
.ctx-item{padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:5px;display:flex;align-items:center;gap:8px;transition:background 0.08s}
.ctx-item:hover{background:var(--bg3);color:var(--text)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(239,68,68,0.1)}
.ctx-sep{height:1px;background:var(--border);margin:4px 6px}

/* Toasts */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:1001;padding:8px 16px;border-radius:100px;font-size:12px;font-weight:500;animation:slideUp 0.2s ease}
.toast-success{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#86efac}
.toast-error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#fca5a5}
.toast-info{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.4);color:#93c5fd}

/* KB Panel */
.kb-panel{position:fixed;top:60px;right:16px;z-index:999;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;min-width:280px;box-shadow:0 12px 40px rgba(0,0,0,0.5);animation:fadeIn 0.15s ease}
.kb-panel h3{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px}
.kb-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:11px}
.kb-key{background:var(--bg3);padding:2px 6px;border-radius:3px;font-size:10px;font-family:monospace;color:var(--text2);border:1px solid var(--border)}

/* Status badge in toolbar */
.status-badge{font-size:11px;padding:2px 10px;border-radius:100px;font-weight:600}
.status-badge.active{background:rgba(34,197,94,0.15);color:var(--green)}
.status-badge.draft{background:rgba(148,163,184,0.15);color:var(--text3)}
.status-badge.failed{background:rgba(239,68,68,0.15);color:var(--red)}

.react-flow__minimap{border-radius:8px!important;overflow:hidden!important;border:1px solid var(--border)!important}
.react-flow__controls{border-radius:8px!important;overflow:hidden!important;border:1px solid var(--border)!important}
.react-flow__controls-button{background:var(--bg2)!important;border-bottom:1px solid var(--border)!important;fill:var(--text2)!important;width:28px!important;height:28px!important}
.react-flow__controls-button:hover{background:var(--bg3)!important}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import React,{useState,useCallback,useRef,useEffect,useMemo,useReducer}from'react';
import{createRoot}from'react-dom/client';
import ReactFlow,{ReactFlowProvider,useNodesState,useEdgesState,addEdge,Controls,MiniMap,Background,Handle,Position,useReactFlow,MarkerType,Panel,useKeyPress}from'reactflow';

// ══ Node Registry ══
const NODE_TYPES={
  trigger:{color:'#eab308',bg:'rgba(234,179,8,0.08)',nodes:[
    {type:'schedule_trigger',label:'Schedule',icon:'⏰',desc:'Run on a cron schedule',params:[{key:'cron',label:'Cron',type:'cron',def:'0 9 * * *'}]},
    {type:'manual_trigger',label:'Manual Trigger',icon:'👆',desc:'Trigger manually',params:[]},
    {type:'webhook_trigger',label:'Webhook',icon:'🪝',desc:'HTTP webhook trigger',params:[{key:'path',label:'Path',type:'text',def:'/hook'}]},
  ]},
  dataSource:{color:'#3b82f6',bg:'rgba(59,130,246,0.08)',nodes:[
    {type:'gmail_search',label:'Gmail Search',icon:'G',desc:'Search Gmail inbox',provider:'gmail',
      params:[{key:'query',label:'Query',type:'text',def:'invoice newer_than:7d'},{key:'maxResults',label:'Max',type:'number',def:'10'}]},
    {type:'gmail_fetch',label:'Gmail Message',icon:'M',desc:'Fetch specific email',provider:'gmail',params:[]},
    {type:'spreadsheet_read',label:'Sheets Read',icon:'S',desc:'Read spreadsheet data',provider:'sheets',params:[{key:'spreadsheetId',label:'Sheet ID',type:'text',def:''},{key:'range',label:'Range',type:'text',def:'Sheet1!A:Z'}]},
    {type:'drive_fetch',label:'Google Drive',icon:'D',desc:'Fetch Drive files',provider:'drive',params:[]},
    {type:'slack_fetch',label:'Slack Messages',icon:'#',desc:'Fetch Slack history',provider:'slack',params:[{key:'channel',label:'Channel',type:'text',def:'#general'}]},
    {type:'file_read',label:'Local File',icon:'📄',desc:'Read local file',params:[{key:'path',label:'Path',type:'text',def:'~/Documents/'}]},
  ]},
  transformation:{color:'#8b5cf6',bg:'rgba(139,92,246,0.08)',nodes:[
    {type:'extract_fields',label:'Extract Fields',icon:'✂',desc:'Extract structured data',params:[{key:'pattern',label:'Pattern',type:'text',def:''}]},
    {type:'summarize',label:'Summarize',icon:'📝',desc:'AI text summarization',params:[]},
    {type:'classify',label:'Classify',icon:'🏷',desc:'Categorize content',params:[]},
    {type:'filter',label:'Filter',icon:'🔍',desc:'Filter rows by condition',params:[{key:'condition',label:'Condition',type:'text',def:'{{amount}} > 0'}]},
    {type:'map_fields',label:'Map Fields',icon:'↔',desc:'Rename/remap fields',params:[]},
  ]},
  decision:{color:'#f59e0b',bg:'rgba(245,158,11,0.08)',nodes:[
    {type:'condition',label:'If Condition',icon:'?',desc:'Branch on expression',params:[{key:'expression',label:'Expression',type:'text',def:'{{status}} == "active"'}]},
    {type:'branch',label:'Multi-Branch',icon:'⑂',desc:'Multi-way branch',params:[]},
  ]},
  action:{color:'#22c55e',bg:'rgba(34,197,94,0.08)',nodes:[
    {type:'send_email',label:'Send Email',icon:'✉',desc:'Send via Gmail API',provider:'gmail',params:[{key:'to',label:'To',type:'text',def:''},{key:'subject',label:'Subject',type:'text',def:''}]},
    {type:'append_sheet_row',label:'Append Row',icon:'📊',desc:'Append to Google Sheet',provider:'sheets',params:[{key:'spreadsheetId',label:'Sheet ID',type:'text',def:''},{key:'values',label:'Values',type:'text',def:'{{invoice}},{{amount}}'}]},
    {type:'slack_post',label:'Slack Post',icon:'#',desc:'Post to Slack channel',provider:'slack',params:[{key:'channel',label:'Channel',type:'text',def:'#alerts'},{key:'text',label:'Message',type:'textarea',def:''}]},
    {type:'upload_file',label:'Upload File',icon:'⬆',desc:'Upload to Drive',provider:'drive',params:[]},
  ]},
  desktop:{color:'#6b7280',bg:'rgba(107,114,128,0.08)',nodes:[
    {type:'open_application',label:'Open App',icon:'📱',desc:'Launch application',params:[{key:'app',label:'App Name',type:'text',def:''}]},
    {type:'type_text',label:'Type Text',icon:'⌨',desc:'Simulate typing',params:[{key:'text',label:'Text',type:'textarea',def:''}]},
    {type:'click_ui_element',label:'Click Element',icon:'🖱',desc:'Click at coordinates',params:[]},
  ]},
};

const CC=({trigger:'#eab308',dataSource:'#3b82f6',transformation:'#8b5cf6',decision:'#f59e0b',action:'#22c55e',desktop:'#6b7280'});
const CB=({trigger:'rgba(234,179,8,0.08)',dataSource:'rgba(59,130,246,0.08)',transformation:'rgba(139,92,246,0.08)',decision:'rgba(245,158,11,0.08)',action:'rgba(34,197,94,0.08)',desktop:'rgba(107,114,128,0.08)'});

// ══ History for Undo/Redo ══
function useHistory(maxSize=50){const[history,dispatch]=useReducer((s,a)=>{
  switch(a.type){case'push':const next=s.stack.slice(0,s.idx+1);next.push(a.data);if(next.length>maxSize)next.shift();return{stack:next,idx:next.length-1}
  case'undo':return s.idx>0?{...s,idx:s.idx-1}:s
  case'redo':return s.idx<s.stack.length-1?{...s,idx:s.idx+1}:s
  case'reset':return{stack:[],idx:-1}
  default:return s}},{stack:[],idx:-1})
const push=useCallback((data)=>dispatch({type:'push',data}),[dispatch])
const undo=useCallback(()=>dispatch({type:'undo'}),[dispatch])
const redo=useCallback(()=>dispatch({type:'redo'}),[dispatch])
return{history,current:history.stack[history.idx]||null,canUndo:history.idx>0,canRedo:history.idx<history.stack.length-1,push,undo,redo}
}

// ══ Custom Node ══
function MirrorNode({id,data,selected}){
  const cat=data.category||'action';const c=CC[cat]||'#6b7280';const bg=CB[cat]||'rgba(107,114,128,0.08)'
  const conf=data.confidence??0.5;const exec=data.executionType||'local';const runState=data._runState
  const anim=runState==='running'?'nodePulse 1.2s infinite':runState==='success'?'nodeSuccess 0.6s ease-out':runState==='failure'?'nodeFail 0.6s ease-out':null
  const borderC=runState==='success'?'#22c55e':runState==='failure'?'#ef4444':runState==='running'?'#6366f1':selected?c:'rgba(255,255,255,0.08)'
  const shadow=runState==='running'?`0 0 0 3px rgba(99,102,241,0.3)`:'0 2px 10px rgba(0,0,0,0.3)'
  return React.createElement('div',{style:{background:'#18181c',border:`1.5px solid ${borderC}`,borderRadius:'12px',minWidth:240,maxWidth:320,boxShadow:shadow,opacity:data.disabled?0.45:1,transition:'all 0.15s ease',fontFamily:'inherit',animation:anim}}, [
    React.createElement('div',{key:'h',style:{padding:'10px 14px',borderBottom:'1px solid rgba(255,255,255,0.05)',display:'flex',alignItems:'center',gap:8,background:bg,borderRadius:'12px 12px 0 0'}},[
      React.createElement('span',{key:'i',style:{fontSize:14}},data.icon||'⬡'),
      React.createElement('span',{key:'n',style:{fontSize:12,fontWeight:600,color:'#f1f5f9',flex:1}},data.label||id),
      data.provider&&React.createElement('span',{key:'p',style:{fontSize:9,padding:'1px 6px',borderRadius:4,background:'rgba(255,255,255,0.06)',color:'#94a3b8',fontWeight:600}},data.provider),
      React.createElement('div',{key:'s',style:{width:7,height:7,borderRadius:'50%',background:runState==='success'?'#22c55e':runState==='failure'?'#ef4444':runState==='running'?'#6366f1':c,flexShrink:0}}),
    ]),
    data.description&&React.createElement('div',{key:'b',style:{padding:'10px 14px',fontSize:11,color:'#94a3b8',lineHeight:1.5}},data.description),
    React.createElement('div',{key:'f',style:{padding:'8px 14px',borderTop:'1px solid rgba(255,255,255,0.05)',display:'flex',alignItems:'center',gap:8,fontSize:10,color:'#475569'}},[
      React.createElement('span',{key:'c',style:{color:conf>0.7?'#22c55e':conf>0.5?'#eab308':'#ef4444'}},Math.round(conf*100)+'%'),
      React.createElement('span',{key:'e',style:{marginLeft:'auto',padding:'1px 6px',borderRadius:3,background:exec==='cloud'?'rgba(34,197,94,0.1)':'rgba(99,102,241,0.1)',color:exec==='cloud'?'#4ade80':'#a5b4fc'}},exec==='cloud'?'☁':'💻'),
    ]),
    React.createElement(Handle,{key:'hi',type:'target',position:Position.Left,style:{width:8,height:8,background:c,border:'2px solid #18181c',borderRadius:'50%',opacity:selected?1:0,transition:'opacity 0.15s'},isConnectable:true}),
    React.createElement(Handle,{key:'ho',type:'source',position:Position.Right,style:{width:8,height:8,background:c,border:'2px solid #18181c',borderRadius:'50%',opacity:selected?1:0,transition:'opacity 0.15s'},isConnectable:true}),
  ]);
}
const nodeTypes={mirrorNode:MirrorNode};

// ══ Sidebar ══
function Sidebar({search,setSearch}){
  const cats=Object.entries(NODE_TYPES)
  const onDragStart=(e,node)=>{e.dataTransfer.setData('application/mirrornode',JSON.stringify(node));e.dataTransfer.effectAllowed='move'}
  return React.createElement('div',{className:'sidebar'},[
    React.createElement('div',{className:'sidebar-search',key:'s'},React.createElement('input',{type:'text',placeholder:'Search nodes...',value:search,onChange:e=>setSearch(e.target.value)})),
    React.createElement('div',{className:'sidebar-cats',key:'c'},cats.map(([catKey,cat])=>{
      const f=search?cat.nodes.filter(n=>n.label.toLowerCase().includes(search.toLowerCase())):cat.nodes
      if(!f.length)return null
      return React.createElement('div',{className:'sidebar-cat',key:catKey},[
        React.createElement('div',{className:'sidebar-cat-header',key:'h'},[
          React.createElement('span',{className:'sidebar-cat-dot',style:{background:cat.color}}),
          catKey.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()),
        ]),
        ...f.map(node=>React.createElement('div',{className:'sidebar-node',key:node.type,draggable:true,onDragStart:e=>onDragStart(e,node)},[
          React.createElement('span',{className:'sidebar-node-icon',style:{background:cat.bg,color:cat.color},key:'i'},node.icon),
          React.createElement('div',{key:'t'},[
            React.createElement('div',{},node.label),
            React.createElement('div',{style:{fontSize:10,color:'#475569',marginTop:1}},node.desc),
          ]),
        ]))
      ])
    }))
  ]);
}

// ══ Inspector ══
function Inspector({selectedNode,onUpdateNode}){
  const[tab,setTab]=useState('summary')
  if(!selectedNode)return React.createElement('div',{className:'inspector hidden'})
  const data=selectedNode.data||{}
  const cat=Object.values(NODE_TYPES).find(c=>c.nodes.some(n=>n.type===selectedNode.type?.replace('mirrorNode','')))
  const nodeDef=cat?.nodes.find(n=>selectedNode.type?.includes?.(n.type)||data.label===n.label)
  const TABS=['Summary','Configuration','Evidence','Data Flow','Execution']

  const updateField=(key,val)=>{
    const newData={...data,[key]:val}
    if(onUpdateNode)onUpdateNode(selectedNode.id,newData)
  }

  return React.createElement('div',{className:'inspector'},[

// ══ Auto-Layout (topological sort) ══
function autoLayout(nodes,edges){
  if(!nodes.length)return nodes
  const adj={};const inDeg={}
  nodes.forEach(n=>{adj[n.id]=[];inDeg[n.id]=0})
  edges.forEach(e=>{adj[e.source]?.push(e.target);inDeg[e.target]=(inDeg[e.target]||0)+1})
  const queue=nodes.filter(n=>inDeg[n.id]===0).map(n=>n.id)
  const layers=[];let q=queue
  while(q.length){layers.push(q);const nq=[];q.forEach(id=>adj[id].forEach(t=>{inDeg[t]--;if(inDeg[t]===0)nq.push(t)}));q=nq}
  const placed=new Set(layers.flat())
  nodes.filter(n=>!placed.has(n.id)).forEach(n=>{if(layers.length)layers[layers.length-1].push(n.id);else layers.push([n.id])})
  const cx=300,cy=160,ox=80,oy=80
  const pos={}
  layers.forEach((layer,ci)=>{layer.forEach((nid,ri)=>{pos[nid]={x:ox+ci*cx,y:oy+ri*cy-(layer.length-1)*cy/2}})})
  return nodes.map(n=>({...n,position:pos[n.id]||n.position}))
}

    // Toast
    toast&&React.createElement('div',{className:`toast toast-${toast.type}`,key:'tst'},toast.msg),
  ]);
}

const root=createRoot(document.getElementById('root'));
root.render(React.createElement(ReactFlowProvider,null,React.createElement(Editor)));
